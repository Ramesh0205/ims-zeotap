version: '2'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ims
      POSTGRES_PASSWORD: ims123
      POSTGRES_DB: ims_db
    ports:
      - "5432:5432"

  mongo:
    image: mongo:4.4
    ports:
      - "27017:27017"

  redis:
    image: redis:6-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - MONGO_URL=mongodb://mongo:27017
      - POSTGRES_URL=postgresql+asyncpg://ims:ims123@postgres:5432/ims_db
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - mongo
      - redis

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
